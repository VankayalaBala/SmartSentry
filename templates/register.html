<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartSentry IIoT</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyber-blue: #00f3ff;
            --cyber-purple: #9d4edd;
            --cyber-pink: #ff006e;
            --cyber-green: #00ff9d;
            --dark-bg: #0a0e17;
            --card-bg: #13182b;
            --gradient-primary: linear-gradient(135deg, #00f3ff 0%, #9d4edd 50%, #ff006e 100%);
            --gradient-secondary: linear-gradient(135deg, #00ff9d 0%, #00f3ff 100%);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(157, 78, 221, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 243, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 0, 110, 0.1) 0%, transparent 50%);
            z-index: -2;
        }
        
        /* Matrix Rain Background */
        .matrix-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.03;
            pointer-events: none;
            z-index: -1;
        }
        
        /* Cyber Grid */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.2;
            z-index: -1;
        }
        
        /* Navigation */
        .navbar {
            background: rgba(10, 14, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
        }
        
        .nav-link {
            color: #ffffff !important;
            font-weight: 600;
            margin: 0 0.5rem;
            padding: 0.5rem 1.5rem !important;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gradient-primary);
            transition: left 0.3s ease;
            z-index: -1;
        }
        
        .nav-link:hover::before {
            left: 0;
        }
        
        .nav-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.3);
        }
        
        /* Main Container */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 50px;
            position: relative;
        }
        
        /* Register Card */
        .register-card {
            background: rgba(19, 24, 43, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 25px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3),
                        0 0 100px rgba(0, 243, 255, 0.1);
            z-index: 1;
        }
        
        .register-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                transparent,
                rgba(0, 243, 255, 0.1),
                transparent 30%
            );
            animation: rotate 10s linear infinite;
            z-index: -1;
        }
        
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        
        .register-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        
        .register-icon {
            font-size: 4rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .register-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }
        
        .register-subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
        }
        
        /* Form Styles */
        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            color: var(--cyber-blue);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-container {
            position: relative;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }
        
        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }
        
        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cyber-blue);
            font-size: 1.2rem;
            z-index: 1;
        }
        
        /* Password Strength Meter */
        .password-strength {
            margin-top: 0.5rem;
        }
        
        .strength-meter {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }
        
        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        .strength-text {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* Terms Checkbox */
        .terms-checkbox {
            margin: 2rem 0;
        }
        
        .form-check-input {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            cursor: pointer;
        }
        
        .form-check-input:checked {
            background-color: var(--cyber-blue);
            border-color: var(--cyber-blue);
        }
        
        .form-check-label {
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
        }
        
        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
            z-index: -1;
        }
        
        .submit-btn:hover::before {
            left: 100%;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.4);
        }
        
        /* Login Link */
        .login-link {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .login-link a {
            color: var(--cyber-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .login-link a:hover {
            text-decoration: underline;
            color: var(--cyber-green);
        }
        
        /* Security Badges */
        .security-badges {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .badge {
            padding: 0.5rem 1rem;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.2);
            border-radius: 20px;
            color: var(--cyber-blue);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Floating Elements */
        .floating-element {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.2;
            z-index: 0;
        }
        
        .float-1 {
            width: 300px;
            height: 300px;
            background: var(--cyber-blue);
            top: 10%;
            right: 10%;
            animation: float 20s infinite ease-in-out;
        }
        
        .float-2 {
            width: 200px;
            height: 200px;
            background: var(--cyber-purple);
            bottom: 20%;
            left: 10%;
            animation: float 15s infinite ease-in-out reverse;
        }
        
        .float-3 {
            width: 150px;
            height: 150px;
            background: var(--cyber-pink);
            top: 50%;
            right: 20%;
            animation: float 25s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }
        
        /* Message Alerts */
        .alert-message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: #ff006e;
            animation: fadeIn 0.5s ease;
        }
        
        .alert-message.success {
            background: rgba(0, 255, 157, 0.1);
            border: 1px solid rgba(0, 255, 157, 0.3);
            color: #00ff9d;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Responsive Design */
        @media (max-width: 768px) {
            .register-card {
                padding: 2rem;
            }
            
            .register-title {
                font-size: 2rem;
            }
            
            .register-icon {
                font-size: 3rem;
            }
            
            .security-badges {
                flex-direction: column;
                align-items: center;
            }
        }
        
        /* Particle Animation */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--cyber-blue);
            border-radius: 50%;
            animation: particleFloat 20s infinite linear;
        }
        
        @keyframes particleFloat {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Eye Toggle for Password */
        .eye-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--cyber-blue);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }
        
        .eye-toggle:hover {
            color: var(--cyber-green);
        }
        
        /* Progress Steps */
        .progress-steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            position: relative;
        }
        
        .progress-steps::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 0;
        }
        
        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        
        .step.active {
            background: var(--cyber-blue);
            color: white;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        
        .step.completed {
            background: var(--cyber-green);
            color: white;
        }
    </style>
</head>
<body>
    <!-- Matrix Rain Background -->
    <canvas class="matrix-bg" id="matrixCanvas"></canvas>
    
    <!-- Cyber Grid -->
    <div class="cyber-grid"></div>
    
    <!-- Floating Elements -->
    <div class="floating-element float-1"></div>
    <div class="floating-element float-2"></div>
    <div class="floating-element float-3"></div>
    
    <!-- Particles -->
    <div class="particles" id="particles"></div>
    
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-shield-alt me-2"></i>SmartSentry
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars text-white"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">
                            <i class="fas fa-home me-2"></i>Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">
                            <i class="fas fa-info-circle me-2"></i>About
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/register">
                            <i class="fas fa-user-plus me-2"></i>Register
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/login">
                            <i class="fas fa-sign-in-alt me-2"></i>Login
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <div class="register-card">
            <!-- Progress Steps -->
            <div class="progress-steps">
                <div class="step active">1</div>
                <div class="step">2</div>
                <div class="step">3</div>
                <div class="step">4</div>
            </div>
            
            <!-- Header -->
            <div class="register-header">
                <div class="register-icon">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h1 class="register-title">CREATE ACCOUNT</h1>
                <p class="register-subtitle">Join SmartSentry's Cyber Defense Network</p>
            </div>
            
            {% if message %}
            <div class="alert-message {{ 'success' if 'Success' in message else '' }}">
                <i class="fas {{ 'fa-check-circle' if 'Success' in message else 'fa-exclamation-circle' }} me-2"></i>
                {{ message }}
            </div>
            {% endif %}
            
            <!-- Registration Form -->
            <form method="POST" action="/register" id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="name">
                        <i class="fas fa-id-card me-1"></i> Full Name
                    </label>
                    <div class="input-container">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" class="form-control" id="name" name="name" 
                               placeholder="Enter your full name" required 
                               pattern="[A-Za-z\s]{3,50}" 
                               title="Name should be 3-50 characters with letters and spaces only">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope me-1"></i> Email Address
                    </label>
                    <div class="input-container">
                        <i class="fas fa-at input-icon"></i>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="phone">
                        <i class="fas fa-phone me-1"></i> Phone Number
                    </label>
                    <div class="input-container">
                        <i class="fas fa-mobile-alt input-icon"></i>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               placeholder="Enter your phone number" required 
                               pattern="[0-9\s\-+]{10,15}" 
                               title="Enter a valid phone number">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-key me-1"></i> Password
                    </label>
                    <div class="input-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="password" name="password" 
                               placeholder="Create a strong password" required 
                               minlength="8" 
                               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$"
                               title="Must contain at least 8 characters, one uppercase, one lowercase, one number and one special character">
                        <button type="button" class="eye-toggle" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-meter">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="strength-text" id="strengthText">Password strength: Weak</div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="c_password">
                        <i class="fas fa-key me-1"></i> Confirm Password
                    </label>
                    <div class="input-container">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-control" id="c_password" name="c_password" 
                               placeholder="Confirm your password" required>
                        <button type="button" class="eye-toggle" id="toggleConfirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="passwordMatch" class="strength-text"></div>
                </div>
                
                <div class="terms-checkbox">
                    <input type="checkbox" class="form-check-input" id="terms" name="terms" required>
                    <label class="form-check-label" for="terms">
                        I agree to the <a href="#" style="color: var(--cyber-blue);">Terms of Service</a> 
                        and <a href="#" style="color: var(--cyber-blue);">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-rocket me-2"></i>CREATE SECURE ACCOUNT
                </button>
            </form>
            
            <div class="login-link">
                Already have an account? <a href="/login">Login here</a>
            </div>
            
            <div class="security-badges">
                <div class="badge">
                    <i class="fas fa-shield-alt"></i>
                    <span>Military-grade Encryption</span>
                </div>
                <div class="badge">
                    <i class="fas fa-lock"></i>
                    <span>100% Secure</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Matrix Rain Effect
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const chars = "01";
        const charSize = 14;
        const columns = canvas.width / charSize;
        const drops = [];
        
        for(let i = 0; i < columns; i++) {
            drops[i] = 1;
        }
        
        function drawMatrix() {
            ctx.fillStyle = 'rgba(10, 14, 23, 0.04)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#00ff9d';
            ctx.font = charSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(char, i * charSize, drops[i] * charSize);
                
                if(drops[i] * charSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        
        // Particles Effect
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            for(let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.animationDelay = Math.random() * 20 + 's';
                particle.style.width = particle.style.height = Math.random() * 3 + 'px';
                particlesContainer.appendChild(particle);
            }
        }
        
        // Password Strength Checker
        function checkPasswordStrength(password) {
            let score = 0;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            // Length check
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            
            // Complexity checks
            if (/[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^A-Za-z0-9]/.test(password)) score++;
            
            // Update UI
            let strength = 'Weak';
            let color = '#ff006e';
            let width = '20%';
            
            if (score >= 4) {
                strength = 'Strong';
                color = '#00ff9d';
                width = '80%';
            } else if (score >= 3) {
                strength = 'Good';
                color = '#00f3ff';
                width = '60%';
            } else if (score >= 2) {
                strength = 'Fair';
                color = '#9d4edd';
                width = '40%';
            }
            
            strengthFill.style.width = width;
            strengthFill.style.background = color;
            strengthText.textContent = `Password strength: ${strength}`;
            strengthText.style.color = color;
        }
        
        // Password Match Checker
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('c_password').value;
            const matchText = document.getElementById('passwordMatch');
            
            if (confirmPassword === '') {
                matchText.textContent = '';
                return;
            }
            
            if (password === confirmPassword) {
                matchText.textContent = '✓ Passwords match';
                matchText.style.color = '#00ff9d';
            } else {
                matchText.textContent = '✗ Passwords do not match';
                matchText.style.color = '#ff006e';
            }
        }
        
        // Toggle Password Visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('c_password');
            const icon = this.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
        
        // Form Validation
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('c_password').value;
            const terms = document.getElementById('terms').checked;
            
            // Check password match
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Passwords do not match!');
                return false;
            }
            
            // Check terms agreement
            if (!terms) {
                e.preventDefault();
                alert('Please agree to the Terms of Service and Privacy Policy');
                return false;
            }
            
            // Show loading animation
            const submitBtn = this.querySelector('.submit-btn');
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>CREATING ACCOUNT...';
            submitBtn.disabled = true;
            
            return true;
        });
        
        // Real-time validation
        document.getElementById('password').addEventListener('input', function() {
            checkPasswordStrength(this.value);
            checkPasswordMatch();
        });
        
        document.getElementById('c_password').addEventListener('input', checkPasswordMatch);
        
        // Animate progress steps based on scroll
        function updateProgressSteps() {
            const steps = document.querySelectorAll('.step');
            const scrollPosition = window.scrollY;
            const windowHeight = window.innerHeight;
            const documentHeight = document.documentElement.scrollHeight;
            
            // Calculate progress (simplified for demo)
            const progress = Math.min(scrollPosition / (documentHeight - windowHeight) * 100, 100);
            
            steps.forEach((step, index) => {
                if (progress > (index * 25)) {
                    step.classList.add('active');
                    if (progress > (index * 25) + 12.5) {
                        step.classList.add('completed');
                    }
                } else {
                    step.classList.remove('active', 'completed');
                }
            });
        }
        
        // Initialize effects
        createParticles();
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        // Animation loop
        function animate() {
            drawMatrix();
            requestAnimationFrame(animate);
        }
        
        // Start animations
        animate();
        
        // Add input focus effects
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.parentElement.classList.add('focused');
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.parentElement.classList.remove('focused');
            });
        });
        
        // Add typing animation to form labels
        document.addEventListener('DOMContentLoaded', function() {
            const labels = document.querySelectorAll('.form-label');
            labels.forEach(label => {
                const originalText = label.textContent;
                label.textContent = '';
                let i = 0;
                
                function typeLabel() {
                    if (i < originalText.length) {
                        label.textContent += originalText.charAt(i);
                        i++;
                        setTimeout(typeLabel, 50);
                    }
                }
                
                // Start typing with delay
                setTimeout(typeLabel, 100 + Math.random() * 500);
            });
            
            // Add floating animation to security badges
            const badges = document.querySelectorAll('.badge');
            badges.forEach((badge, index) => {
                badge.style.animationDelay = `${index * 0.2}s`;
                badge.classList.add('animate__animated', 'animate__fadeInUp');
            });
        });
    </script>
</body>
</html>
